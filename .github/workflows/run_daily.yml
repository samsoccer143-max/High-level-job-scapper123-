name: Hugging Face Keep-Alive Alarm

on:
  schedule:
    # This triggers the alarm automatically every morning at 5:30 AM IST (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to also trigger it manually whenever you want

jobs:
  wake-up-space:
    runs-on: ubuntu-latest
    steps:
      - name: Send Wake Up Signal to Hugging Face
        run: |
          echo "Waking up the Govt Job Monitor Space..."
          curl -sL "https://huggingface.co/spaces/Blastire/govt-job-monitor" > /dev/null
          echo "Signal successfully transmitted!"
