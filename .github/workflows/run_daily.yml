name: Live Govt Job Screener

on:
  schedule:
    # Runs automatically every single day at 03:00 AM UTC (8:30 AM IST)
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Keeps a manual trigger button active in your GitHub actions panel

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Pull Repository Files
      uses: actions/checkout@v4

    - name: Initialize Python Core
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Fetch Pipeline Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml

    - name: Run Profile Matcher Scraper
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python scraper.py
